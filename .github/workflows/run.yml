name: CNU Dorm Bot

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          WEBHOOK_INT_RECRUIT: ${{ secrets.WEBHOOK_INT_RECRUIT }}
          WEBHOOK_INT_EVENT: ${{ secrets.WEBHOOK_INT_EVENT }}
          WEBHOOK_INT_JOB: ${{ secrets.WEBHOOK_INT_JOB }}
          WEBHOOK_HUM_NOTICE: ${{ secrets.WEBHOOK_HUM_NOTICE }}
          WEBHOOK_JPN_NOTICE: ${{ secrets.WEBHOOK_JPN_NOTICE }}
          WEBHOOK_PLUS_NEWS: ${{ secrets.WEBHOOK_PLUS_NEWS }}
          WEBHOOK_PLUS_ACAD: ${{ secrets.WEBHOOK_PLUS_ACAD }}
          WEBHOOK_PLUS_EDU: ${{ secrets.WEBHOOK_PLUS_EDU }}
          WEBHOOK_PLUS_STARTUP: ${{ secrets.WEBHOOK_PLUS_STARTUP }}
          WEBHOOK_PLUS_HIRE: ${{ secrets.WEBHOOK_PLUS_HIRE }}
          WEBHOOK_PLUS_SEMINAR: ${{ secrets.WEBHOOK_PLUS_SEMINAR }}
        run: python bot.py

      - name: Commit data
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add latest_posts.json || true
          git commit -m "update data" || true
          git push || true
